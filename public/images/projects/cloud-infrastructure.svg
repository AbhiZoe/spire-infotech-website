<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" fill="none">
  <rect width="320" height="200" fill="#0F1419"/>
  <!-- Background grid -->
  <line x1="0" y1="40" x2="320" y2="40" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="80" x2="320" y2="80" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="120" x2="320" y2="120" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="0" y1="160" x2="320" y2="160" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="64" y1="0" x2="64" y2="200" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="128" y1="0" x2="128" y2="200" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="192" y1="0" x2="192" y2="200" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <line x1="256" y1="0" x2="256" y2="200" stroke="#1fc7c7" stroke-width="0.5" opacity="0.1"/>
  <!-- Server nodes -->
  <rect x="20" y="20" width="60" height="36" rx="6" fill="#1F2A30" stroke="#1fc7c7" stroke-width="1.5"/>
  <rect x="28" y="28" width="44" height="5" rx="2" fill="#1fc7c7" opacity="0.6"/>
  <rect x="28" y="36" width="36" height="5" rx="2" fill="#1fc7c7" opacity="0.3"/>
  <rect x="28" y="44" width="44" height="4" rx="2" fill="#1fc7c7" opacity="0.2"/>
  <rect x="130" y="20" width="60" height="36" rx="6" fill="#1F2A30" stroke="#1fc7c7" stroke-width="1.5"/>
  <rect x="138" y="28" width="44" height="5" rx="2" fill="#1fc7c7" opacity="0.6"/>
  <rect x="138" y="36" width="36" height="5" rx="2" fill="#1fc7c7" opacity="0.3"/>
  <rect x="138" y="44" width="44" height="4" rx="2" fill="#1fc7c7" opacity="0.2"/>
  <rect x="240" y="20" width="60" height="36" rx="6" fill="#1F2A30" stroke="#1fc7c7" stroke-width="1.5"/>
  <rect x="248" y="28" width="44" height="5" rx="2" fill="#1fc7c7" opacity="0.6"/>
  <rect x="248" y="36" width="36" height="5" rx="2" fill="#1fc7c7" opacity="0.3"/>
  <rect x="248" y="44" width="44" height="4" rx="2" fill="#1fc7c7" opacity="0.2"/>
  <!-- Connection lines -->
  <line x1="80" y1="38" x2="130" y2="38" stroke="#1fc7c7" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <line x1="190" y1="38" x2="240" y2="38" stroke="#1fc7c7" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>
  <!-- Load balancer -->
  <rect x="110" y="88" width="100" height="36" rx="6" fill="#1F2A30" stroke="#1fc7c7" stroke-width="2"/>
  <rect x="120" y="96" width="80" height="5" rx="2" fill="#1fc7c7" opacity="0.7"/>
  <rect x="120" y="106" width="56" height="4" rx="2" fill="#1fc7c7" opacity="0.4"/>
  <rect x="120" y="114" width="80" height="3" rx="1.5" fill="#1fc7c7" opacity="0.2"/>
  <!-- Down connections -->
  <line x1="50" y1="56" x2="150" y2="88" stroke="#1fc7c7" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="160" y1="56" x2="160" y2="88" stroke="#1fc7c7" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <line x1="270" y1="56" x2="170" y2="88" stroke="#1fc7c7" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <!-- Database nodes -->
  <ellipse cx="80" cy="158" rx="36" ry="12" stroke="#1fc7c7" stroke-width="1.5" fill="#1F2A30"/>
  <rect x="44" y="148" width="72" height="28" fill="none" stroke="#1fc7c7" stroke-width="1.5"/>
  <ellipse cx="80" cy="176" rx="36" ry="12" stroke="#1fc7c7" stroke-width="1.5" fill="#1F2A30"/>
  <ellipse cx="240" cy="158" rx="36" ry="12" stroke="#1fc7c7" stroke-width="1.5" fill="#1F2A30"/>
  <rect x="204" y="148" width="72" height="28" fill="none" stroke="#1fc7c7" stroke-width="1.5"/>
  <ellipse cx="240" cy="176" rx="36" ry="12" stroke="#1fc7c7" stroke-width="1.5" fill="#1F2A30"/>
  <!-- DB connections -->
  <line x1="160" y1="124" x2="80" y2="146" stroke="#1fc7c7" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
  <line x1="160" y1="124" x2="240" y2="146" stroke="#1fc7c7" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>
</svg>
