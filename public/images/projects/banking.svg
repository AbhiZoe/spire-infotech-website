<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1FC7C7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#138585;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="400" height="240" rx="12" fill="#0f1f2a"/>
  <!-- Mobile frame centered -->
  <rect x="130" y="10" width="140" height="220" rx="20" fill="#1a3040" stroke="#1FC7C7" stroke-width="1.5"/>
  <!-- Phone notch -->
  <rect x="170" y="18" width="60" height="8" rx="4" fill="#0f1f2a"/>
  <!-- Balance card -->
  <rect x="144" y="36" width="112" height="56" rx="10" fill="url(#bankGrad)"/>
  <text x="200" y="58" font-family="Inter, sans-serif" font-size="9" fill="white" opacity="0.7" text-anchor="middle">Total Balance</text>
  <text x="200" y="76" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">₹ 2,45,890</text>
  <!-- Quick actions -->
  <rect x="144" y="100" width="112" height="40" rx="8" fill="#1FC7C7" opacity="0.1"/>
  <circle cx="162" cy="120" r="10" fill="#1FC7C7" opacity="0.8"/>
  <circle cx="190" cy="120" r="10" fill="#1FC7C7" opacity="0.6"/>
  <circle cx="218" cy="120" r="10" fill="#1FC7C7" opacity="0.4"/>
  <circle cx="246" cy="120" r="10" fill="#1FC7C7" opacity="0.3"/>
  <!-- Transactions list -->
  <rect x="144" y="148" width="112" height="12" rx="6" fill="white" opacity="0.1"/>
  <rect x="144" y="166" width="112" height="12" rx="6" fill="white" opacity="0.07"/>
  <rect x="144" y="184" width="112" height="12" rx="6" fill="white" opacity="0.05"/>
  <!-- Right side bar chart -->
  <rect x="290" y="40" width="90" height="160" rx="8" fill="#1a3040"/>
  <rect x="302" y="160" width="12" height="28" rx="6" fill="#1FC7C7" opacity="0.5"/>
  <rect x="320" y="140" width="12" height="48" rx="6" fill="#1FC7C7" opacity="0.7"/>
  <rect x="338" y="120" width="12" height="68" rx="6" fill="#1FC7C7" opacity="0.9"/>
  <rect x="356" y="130" width="12" height="58" rx="6" fill="#1FC7C7" opacity="0.8"/>
  <rect x="302" y="52" width="60" height="8" rx="4" fill="white" opacity="0.3"/>
  <rect x="302" y="66" width="45" height="6" rx="3" fill="white" opacity="0.2"/>
