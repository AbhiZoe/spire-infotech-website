<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="16" fill="#EBF9F9"/>
  <!-- Brain / AI shape using circles and lines -->
  <circle cx="32" cy="26" r="12" fill="white" stroke="#1FC7C7" stroke-width="2.5"/>
  <!-- Neural nodes -->
  <circle cx="26" cy="22" r="2.5" fill="#1FC7C7"/>
  <circle cx="32" cy="19" r="2.5" fill="#1FC7C7"/>
  <circle cx="38" cy="22" r="2.5" fill="#1FC7C7"/>
  <circle cx="28" cy="30" r="2.5" fill="#1FC7C7" opacity="0.6"/>
  <circle cx="36" cy="30" r="2.5" fill="#1FC7C7" opacity="0.6"/>
  <!-- Neural connections -->
  <line x1="26" y1="22" x2="32" y2="19" stroke="#1FC7C7" stroke-width="1.5" opacity="0.5"/>
  <line x1="32" y1="19" x2="38" y2="22" stroke="#1FC7C7" stroke-width="1.5" opacity="0.5"/>
  <line x1="26" y1="22" x2="28" y2="30" stroke="#1FC7C7" stroke-width="1.5" opacity="0.5"/>
  <line x1="38" y1="22" x2="36" y2="30" stroke="#1FC7C7" stroke-width="1.5" opacity="0.5"/>
  <line x1="28" y1="30" x2="36" y2="30" stroke="#1FC7C7" stroke-width="1.5" opacity="0.5"/>
  <!-- Base -->
  <rect x="29" y="38" width="6" height="6" rx="1" fill="#1FC7C7" opacity="0.5"/>
  <rect x="24" y="44" width="16" height="3" rx="1.5" fill="#1FC7C7" opacity="0.3"/>
</svg>
